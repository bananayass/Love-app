<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Palette body -->
  <ellipse cx="28" cy="30" rx="22" ry="18" fill="#F4A460" stroke="#8B4513" stroke-width="2"/>
  <!-- Palette inner highlight -->
  <ellipse cx="26" cy="28" rx="18" ry="14" fill="#FFDAB9" opacity="0.5"/>
  <!-- Thumb hole -->
  <ellipse cx="14" cy="36" rx="4" ry="5" fill="#FFF8DC" stroke="#8B4513" stroke-width="1.5"/>
  <!-- Paint colors on palette -->
  <circle cx="28" cy="22" r="4" fill="#FF6B6B"/>
  <circle cx="38" cy="24" r="3.5" fill="#4ECDC4"/>
  <circle cx="44" cy="32" r="3" fill="#FFE66D"/>
  <circle cx="42" cy="40" r="3.5" fill="#95E1D3"/>
  <circle cx="32" cy="42" r="3" fill="#DDA0DD"/>
  <circle cx="22" cy="40" r="3.5" fill="#FF8C00"/>
  <!-- Brush handle -->
  <rect x="48" y="8" width="5" height="28" rx="2" fill="#8B4513" transform="rotate(35, 50, 22)"/>
  <!-- Brush ferrule -->
  <rect x="47" y="34" width="7" height="6" rx="1" fill="#C0C0C0" transform="rotate(35, 50, 37)"/>
  <!-- Brush bristles -->
  <ellipse cx="60" cy="44" rx="5" ry="8" fill="#DEB887" transform="rotate(35, 60, 44)"/>
  <!-- Paint on brush tip -->
  <ellipse cx="62" cy="48" rx="3" ry="4" fill="#FF6B6B" transform="rotate(35, 62, 48)"/>
</svg>