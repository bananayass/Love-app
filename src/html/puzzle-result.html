  <!-- Replay button -->

  <script>
    function init() {
      const videoPopOverlay = document.getElementById('videoPopOverlay');
      const popVideo = document.getElementById('popVideo');

      videoPopOverlay.classList.add('active');
      popVideo.play().catch(() => { });
      populateOverlayDecor();

      setTimeout(() => {
        videoPopOverlay.classList.add('hiding');
        popVideo.pause();
        setTimeout(() => {
          videoPopOverlay.classList.remove('active', 'hiding');
        }, 500);
        document.body.classList.remove('not-loaded');
        createRainEffects();
        createFloatingBGDecor();
      }, 3000);
    }

    function populateOverlayDecor() {
      const container = document.getElementById('overlayDecor');
      if (!container) return;
      container.innerHTML = '';

      const items = ['💕', '💖', '💗', '💓', '🩷', '💜', '🩵', '🍃', '🌿', '☘️', '🍂', '🌸'];
      for (let i = 0; i < 50; i++) {
        const item = document.createElement('div');
        item.className = 'overlay-decor-item';
        item.textContent = items[Math.floor(Math.random() * items.length)];
        item.style.left = `${Math.random() * 100}%`;
        item.style.animationDuration = `${4 + Math.random() * 6}s`;
        item.style.animationDelay = `${Math.random() * 4}s`;
        item.style.fontSize = `${28 + Math.random() * 28}px`;
        container.appendChild(item);
      }
    }

    function createRainEffects() {
      const container = document.getElementById('rainEffect');
      const stars = ['★', '✦', '✧', '☆', '⭐', '🌟', '✨'];
      const images = ['../images/d1.jpg', '../images/d2.jpg', '../images/d3.jpg', '../images/d4.jpg'];
      const leaves = ['🍃', '🌿', '☘️', '🍂'];

      for (let i = 0; i < 40; i++) {
        const item = document.createElement('div');
        item.className = 'rain-item';
        item.style.left = `${Math.random() * 100}%`;
        item.style.animationDelay = `${Math.random() * 6}s`;

        const rand = Math.random();
        if (rand < 0.3) {
          item.classList.add('star');
          item.textContent = stars[Math.floor(Math.random() * stars.length)];
          item.style.fontSize = (20 + Math.random() * 30) + 'px';
        } else if (rand < 0.5) {
          item.classList.add('leaf');
          item.textContent = leaves[Math.floor(Math.random() * leaves.length)];
          item.style.fontSize = (24 + Math.random() * 20) + 'px';
        } else {
          const img = document.createElement('img');
          img.src = images[Math.floor(Math.random() * images.length)];
          img.style.width = (50 + Math.random() * 60) + 'px';
          img.style.height = (50 + Math.random() * 60) + 'px';
          item.appendChild(img);
        }
        container.appendChild(item);
      }
    }

    function createFloatingBGDecor() {
      const container = document.getElementById('rainEffect');
      if (!container) return;
      const hearts = ['💕', '💖', '💗', '💓', '🩷', '💜', '🩵'];
      for (let i = 0; i < 20; i++) {
        const heart = document.createElement('div');
        heart.className = 'bg-float-heart';
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = `${Math.random() * 100}%`;
        heart.style.fontSize = `${18 + Math.random() * 16}px`;
        heart.style.animationDelay = `${Math.random() * 3}s`;
        container.appendChild(heart);
      }
    }

    function playAgain() {
      window.location.href = '../html/anniversary.html';
    }

    window.addEventListener('load', init);
  </script>
