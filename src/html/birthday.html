<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 💝</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffeef8 0%, #fff4fb 20%, #e8f0fe 50%, #fef0e8 75%, #f0ffe8 100%);
      background-size: 400% 400%;
      animation: gradientFlow 18s ease infinite;
      font-family: 'Quicksand', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    @keyframes gradientFlow {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* ── Confetti (CSS only, minimal) ── */
    .confetti-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .conf {
      position: absolute;
      top: -20px;
      animation: confFall linear infinite;
      border-radius: 2px;
    }

    @keyframes confFall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.8;
      }

      100% {
        transform: translateY(105vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* ── Main Content ── */
    .scene {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* ── Happy Birthday Title ── */
    .title {
      font-family: 'Dancing Script', cursive;
      font-size: 3.8rem;
      color: #ff69b4;
      text-shadow: 0 0 20px rgba(255, 105, 180, 0.5), 2px 2px 0 rgba(0, 0, 0, 0.1);
      opacity: 0;
      transform: scale(0.5);
      animation: titleReveal 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
    }

    @keyframes titleReveal {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* ── Subtitle ── */
    .subtitle {
      font-size: 1.1rem;
      color: #b04080;
      letter-spacing: 2px;
      opacity: 0;
      animation: fadeUp 1s ease 1s forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Cake Stage ── */
    .cake-stage {
      position: relative;
      cursor: pointer;
      opacity: 0;
      animation: cakeRise 1s cubic-bezier(0.34, 1.4, 0.64, 1) 1.5s forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes cakeRise {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Candles ── */
    .candles {
      display: flex;
      gap: 18px;
      margin-bottom: 8px;
    }

    .candle {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .flame {
      width: 14px;
      height: 22px;
      background: radial-gradient(ellipse at 50% 70%, #fff7a0, #ff9500, #ff4500);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 0 10px #ff9500, 0 0 20px #ff6b00, 0 0 30px rgba(255, 100, 0, 0.5);
      animation: flicker 0.3s ease-in-out infinite alternate;
      transform-origin: bottom center;
      margin-bottom: -4px;
    }

    @keyframes flicker {
      0% {
        transform: scaleY(1) scaleX(1) rotate(-2deg);
      }

      50% {
        transform: scaleY(1.1) scaleX(0.9) rotate(2deg);
      }

      100% {
        transform: scaleY(0.95) scaleX(1.05) rotate(-1deg);
      }
    }

    .wick {
      width: 2px;
      height: 8px;
      background: #333;
      border-radius: 1px;
    }

    .candle-stick {
      width: 12px;
      height: 40px;
      border-radius: 3px;
      background: linear-gradient(90deg, #f8c8dc, #ffb6c1, #f8c8dc);
    }

    .flame.out {
      animation: blowOut 0.5s ease forwards;
    }

    @keyframes blowOut {
      0% {
        transform: scaleY(1) scaleX(1);
        opacity: 1;
      }

      30% {
        transform: scaleY(2) scaleX(0.3);
        opacity: 0.8;
      }

      100% {
        transform: scaleY(0) scaleX(0);
        opacity: 0;
      }
    }

    /* ── Smoke puff ── */
    .smoke {
      position: fixed;
      width: 8px;
      height: 8px;
      background: rgba(200, 200, 200, 0.5);
      border-radius: 50%;
      animation: smokeRise 1s ease-out forwards;
      pointer-events: none;
      z-index: 50;
    }

    @keyframes smokeRise {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0.7;
      }

      100% {
        transform: translateY(-60px) scale(2);
        opacity: 0;
      }
    }

    /* ── Hint text / Blow button ── */
    .hint-text {
      font-size: 14px;
      color: rgba(176, 64, 128, 0.8);
      letter-spacing: 2px;
      animation: hintPulse 2s ease-in-out infinite;
      text-align: center;
      margin-top: 6px;
    }

    @keyframes hintPulse {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    .blow-btn {
      padding: 12px 32px;
      font-size: 1rem;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #ff69b4, #ff1493);
      color: white;
      cursor: pointer;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      letter-spacing: 2px;
      box-shadow: 0 4px 20px rgba(255, 20, 147, 0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: hintPulse 2s ease-in-out infinite;
    }

    .blow-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 8px 28px rgba(255, 20, 147, 0.5);
    }

    /* ── Cake SVG ── */
    .cake-svg {
      display: block;
      filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.15));
    }

    /* ── Wish Card ── */
    .wish-card {
      position: relative;
      z-index: 15;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 24px;
      padding: 32px 40px;
      border: 2px solid rgba(255, 180, 200, 0.4);
      box-shadow: 0 12px 40px rgba(176, 64, 128, 0.15);
      max-width: 480px;
      width: 90%;
      text-align: center;
      display: none;
    }

    .wish-card.show {
      display: block;
      animation: cardReveal 0.7s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    }

    @keyframes cardReveal {
      from {
        opacity: 0;
        transform: scale(0.85) translateY(30px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .wish-card h2 {
      font-family: 'Dancing Script', cursive;
      font-size: 2.4rem;
      color: #e04080;
      margin-bottom: 16px;
    }

    .wish-card p {
      font-size: 1rem;
      line-height: 1.9;
      color: #5a3a4a;
      margin-bottom: 10px;
    }

    .wish-card .highlight-text {
      color: #e04080;
      font-weight: 600;
    }

    .wish-card .signature {
      font-family: 'Dancing Script', cursive;
      font-size: 1.4rem;
      color: #e04080;
      text-align: right;
      margin-top: 16px;
    }

    /* Wish lines reveal staggered */
    .wish-line {
      opacity: 0;
      transform: translateY(10px);
    }

    .wish-card.show .wish-line {
      animation: lineReveal 0.5s ease forwards;
    }

    .wish-card.show .wish-line:nth-child(1) {
      animation-delay: 0.15s;
    }

    .wish-card.show .wish-line:nth-child(2) {
      animation-delay: 0.3s;
    }

    .wish-card.show .wish-line:nth-child(3) {
      animation-delay: 0.45s;
    }

    .wish-card.show .wish-line:nth-child(4) {
      animation-delay: 0.6s;
    }

    .wish-card.show .wish-line:nth-child(5) {
      animation-delay: 0.75s;
    }

    .wish-card.show .wish-line:nth-child(6) {
      animation-delay: 0.9s;
    }

    @keyframes lineReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Actions row */
    .wish-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .party-btn {
      padding: 12px 28px;
      font-size: 1rem;
      background: linear-gradient(135deg, #ff69b4, #ff1493);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      letter-spacing: 1px;
      box-shadow: 0 4px 16px rgba(255, 20, 147, 0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .party-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 24px rgba(255, 20, 147, 0.5);
    }

    .next-btn {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #e04080, #c03070);
      color: white;
      border-radius: 50px;
      text-decoration: none;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 1px;
      box-shadow: 0 4px 16px rgba(176, 64, 128, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .next-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(176, 64, 128, 0.4);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .title {
        font-size: 2.6rem;
      }

      .cake-svg {
        width: 260px;
      }

      .wish-card {
        padding: 24px 20px;
      }

      .wish-card h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
  <audio id="bgMusic" src="../images/sinnhat.mp4" autoplay loop></audio>

  <div class="confetti-container" id="confettiContainer"></div>

  <div class="scene">
    <h1 class="title">Happy Birthday 💝</h1>
    <p class="subtitle">Chúc bé yêu sinh nhật vui vẻ nè</p>

    <div class="cake-stage" id="cakeStage">
      <!-- Candles -->
      <div class="candles">
        <div class="candle">
          <div class="flame" id="f0"></div>
          <div class="wick"></div>
          <div class="candle-stick"></div>
        </div>
        <div class="candle">
          <div class="flame" id="f1"></div>
          <div class="wick"></div>
          <div class="candle-stick"></div>
        </div>
        <div class="candle">
          <div class="flame" id="f2"></div>
          <div class="wick"></div>
          <div class="candle-stick"></div>
        </div>
      </div>

      <!-- Cake SVG -->
      <svg class="cake-svg" width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="150" cy="192" rx="140" ry="8" fill="#f0c8dc" opacity="0.6" />

        <!-- Bottom layer -->
        <rect x="20" y="130" width="260" height="60" rx="8" fill="url(#cakeGrad1)" />
        <rect x="20" y="130" width="260" height="15" rx="8" fill="url(#frostingTop)" opacity="0.9" />
        <path
          d="M20,145 Q35,160 50,145 Q65,155 80,145 Q95,158 110,145 Q125,155 140,145 Q155,158 170,145 Q185,155 200,145 Q215,158 230,145 Q245,155 260,145 Q275,155 280,145 L280,190 L20,190 Z"
          fill="#f8b8d0" />

        <!-- Middle layer -->
        <rect x="50" y="80" width="200" height="55" rx="8" fill="url(#cakeGrad2)" />
        <rect x="50" y="80" width="200" height="12" rx="8" fill="url(#frostingTop)" opacity="0.9" />
        <path
          d="M50,92 Q65,105 80,92 Q95,103 110,92 Q125,105 140,92 Q155,103 170,92 Q185,105 200,92 Q215,103 230,92 Q245,103 250,92 L250,135 L50,135 Z"
          fill="#f8b8d0" />

        <!-- Top layer -->
        <rect x="80" y="35" width="140" height="50" rx="8" fill="url(#cakeGrad3)" />
        <rect x="80" y="35" width="140" height="12" rx="8" fill="url(#frostingTop)" opacity="0.9" />
        <path d="M80,47 Q95,58 110,47 Q125,56 140,47 Q155,56 170,47 Q185,56 200,47 Q215,56 220,47 L220,85 L80,85 Z"
          fill="#f8b8d0" />

        <!-- Cherry -->
        <circle cx="150" cy="25" r="12" fill="url(#cherryGrad)" />
        <ellipse cx="146" cy="21" rx="4" ry="3" fill="rgba(255,255,255,0.4)" />
        <path d="M150,13 Q158,5 162,8" stroke="#4a7c20" stroke-width="2.5" fill="none" stroke-linecap="round" />
        <ellipse cx="160" cy="10" rx="5" ry="3" fill="#5a9c30" transform="rotate(-20,160,10)" />

        <!-- Sprinkles -->
        <rect x="95" y="52" width="8" height="3" rx="1" fill="#ff69b4" transform="rotate(25,95,52)" />
        <rect x="120" y="56" width="8" height="3" rx="1" fill="#ffd700" transform="rotate(-15,120,56)" />
        <rect x="145" y="50" width="8" height="3" rx="1" fill="#87ceeb" transform="rotate(40,145,50)" />
        <rect x="170" y="55" width="8" height="3" rx="1" fill="#98fb98" transform="rotate(-30,170,55)" />
        <rect x="195" y="52" width="8" height="3" rx="1" fill="#ff69b4" transform="rotate(10,195,52)" />

        <!-- Heart decorations -->
        <path
          d="M75,105 C75,100 70,96 66,96 C60,96 57,101 57,106 C57,114 75,122 75,122 C75,122 93,114 93,106 C93,101 90,96 84,96 C80,96 75,100 75,105Z"
          fill="#ff69b4" opacity="0.9" />
        <path
          d="M195,105 C195,100 190,96 186,96 C180,96 177,101 177,106 C177,114 195,122 195,122 C195,122 213,114 213,106 C213,101 210,96 204,96 C200,96 195,100 195,105Z"
          fill="#ff69b4" opacity="0.9" />
        <circle cx="130" cy="108" r="6" fill="#ffd700" opacity="0.9" />
        <circle cx="130" cy="108" r="3" fill="#fffacd" opacity="0.7" />

        <!-- Stars -->
        <polygon points="55,162 57,167 62,167 58,170 60,175 55,172 50,175 52,170 48,167 53,167" fill="#ffd700"
          opacity="0.85" />
        <polygon points="240,159 241.5,163 246,163 242.5,165.5 244,170 240,167 236,170 237.5,165.5 234,163 238.5,163"
          fill="#ffd700" opacity="0.85" />
        <circle cx="110" cy="165" r="4" fill="#87ceeb" opacity="0.7" />
        <circle cx="185" cy="168" r="4" fill="#ff6b81" opacity="0.7" />

        <defs>
          <linearGradient id="cakeGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#f8c8dc" />
            <stop offset="50%" style="stop-color:#ffb6c1" />
            <stop offset="100%" style="stop-color:#f8c8dc" />
          </linearGradient>
          <linearGradient id="cakeGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#ffd1dc" />
            <stop offset="50%" style="stop-color:#ffc0cb" />
            <stop offset="100%" style="stop-color:#ffd1dc" />
          </linearGradient>
          <linearGradient id="cakeGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#ffe0ec" />
            <stop offset="50%" style="stop-color:#ffd6e8" />
            <stop offset="100%" style="stop-color:#ffe0ec" />
          </linearGradient>
          <linearGradient id="frostingTop" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff" />
            <stop offset="100%" style="stop-color:#ffe0f0" />
          </linearGradient>
          <radialGradient id="cherryGrad" cx="35%" cy="35%">
            <stop offset="0%" style="stop-color:#ff4466" />
            <stop offset="100%" style="stop-color:#cc0033" />
          </radialGradient>
        </defs>
      </svg>

      <!-- Hint text below cake -->
      <p class="hint-text" id="cakeHint">✨ Thổi nến nào ✨</p>
    </div>

    <!-- Wish card (hidden) -->
    <div class="wish-card" id="wishCard">
      <h2 class="wish-line">🎂 Chúc bé yêu 🎂</h2>
      <p class="wish-line">Sinh nhật vui vẻ nè bé ơi! 🥳</p>
      <p class="wish-line">Chúc <span class="highlight-text">em luôn vui vẻ</span>, khỏe mạnh, và làm được những điều em
        mơ ước.</p>
      <p class="wish-line">Một tuổi mới với thật nhiều <span class="highlight-text">niềm vui và hạnh phúc</span> nha!
      </p>
      <p class="wish-line">Cảm ơn em đã yêu anh 💝</p>
      <div class="signature wish-line">Yêu em nhất ❤️</div>
      <div class="wish-actions wish-line">
        <button class="party-btn" onclick="triggerBurst()">🎉 Khoe bạn bè nào 🎉</button>
        <a href="quiz.html" class="next-btn">💝 Tiếp nữa nè bé 💝 →</a>
      </div>
    </div>
  </div>

  <script>
    /* ─── Confetti (lightweight) ─── */
    const confColors = ['#ff69b4', '#ff1493', '#ffd700', '#ff85a2', '#87ceeb', '#98fb98'];
    function spawnConfetti() {
      const c = document.createElement('div');
      c.className = 'conf';
      const size = 6 + Math.random() * 6;
      c.style.cssText = `
        left:${Math.random() * 100}%;
        width:${size}px; height:${size * 0.4}px;
        background:${confColors[Math.floor(Math.random() * confColors.length)]};
        animation-duration:${4 + Math.random() * 4}s;
        animation-delay:${-Math.random() * 3}s;
      `;
      document.getElementById('confettiContainer').appendChild(c);
      setTimeout(() => c.remove(), 8000);
    }
    for (let i = 0; i < 15; i++) spawnConfetti();
    setInterval(spawnConfetti, 800);

    /* ─── Simple heart burst (canvas) ─── */
    let burstParticles = [];
    const burstCanvas = document.createElement('canvas');
    burstCanvas.style.cssText = 'position:fixed;inset:0;z-index:50;pointer-events:none;';
    document.body.appendChild(burstCanvas);
    const bctx = burstCanvas.getContext('2d');

    function resizeBurst() {
      burstCanvas.width = window.innerWidth;
      burstCanvas.height = window.innerHeight;
    }
    resizeBurst();
    window.addEventListener('resize', resizeBurst);

    function spawnHearts(cx, cy, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 4;
        burstParticles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 2,
          size: 10 + Math.random() * 14,
          alpha: 1,
          rot: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.15,
          decay: 0.015 + Math.random() * 0.01,
          color: ['#ff69b4', '#ff1493', '#ffd700', '#ff6b81', '#da70d6'][Math.floor(Math.random() * 5)],
        });
      }
    }

    function drawHeart(x, y, size, color, alpha, rot) {
      bctx.save();
      bctx.globalAlpha = alpha;
      bctx.fillStyle = color;
      bctx.translate(x, y);
      bctx.rotate(rot);
      bctx.beginPath();
      bctx.moveTo(0, size * 0.3);
      bctx.bezierCurveTo(-size / 2, -size * 0.3, -size, size * 0.1, 0, size);
      bctx.bezierCurveTo(size, size * 0.1, size / 2, -size * 0.3, 0, size * 0.3);
      bctx.fill();
      bctx.restore();
    }

    function animateBurst() {
      bctx.clearRect(0, 0, burstCanvas.width, burstCanvas.height);
      burstParticles = burstParticles.filter(p => p.alpha > 0.02);
      burstParticles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.vx *= 0.99;
        p.rot += p.rotSpeed;
        p.alpha -= p.decay;
        drawHeart(p.x, p.y, p.size, p.color, p.alpha, p.rot);
      });
      requestAnimationFrame(animateBurst);
    }
    animateBurst();

    function triggerBurst() {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      spawnHearts(cx, cy, 25);
      setTimeout(() => spawnHearts(cx - 100, cy - 50, 15), 150);
      setTimeout(() => spawnHearts(cx + 100, cy - 50, 15), 300);
    }

    /* ─── Candle blow ─── */
    let blown = false;

    function blowCandles() {
      if (blown) return;
      blown = true;

      const flames = document.querySelectorAll('.flame');
      const hint = document.getElementById('cakeHint');
      if (hint) hint.style.display = 'none';

      flames.forEach((f, i) => {
        setTimeout(() => {
          f.classList.add('out');
          // Smoke puffs
          const rect = f.getBoundingClientRect();
          for (let j = 0; j < 3; j++) {
            const smoke = document.createElement('div');
            smoke.className = 'smoke';
            smoke.style.left = (rect.left + rect.width / 2 - 4 + (Math.random() - 0.5) * 12) + 'px';
            smoke.style.top = (rect.top - 5) + 'px';
            document.body.appendChild(smoke);
            setTimeout(() => smoke.remove(), 1000);
          }
        }, i * 200);
      });

      // Show wish card after candles blown
      setTimeout(() => {
        document.getElementById('wishCard').classList.add('show');
        // Heart burst from cake center
        const stage = document.getElementById('cakeStage');
        const rect = stage.getBoundingClientRect();
        spawnHearts(rect.left + rect.width / 2, rect.top + rect.height / 2, 20);
      }, 900);
    }

    // Click cake to blow
    document.getElementById('cakeStage').addEventListener('click', blowCandles);

    // Replace hint with blow button after 4s
    function addBlowButton() {
      const hint = document.getElementById('cakeHint');
      if (!hint || hint.tagName === 'BUTTON') return;
      const btn = document.createElement('button');
      btn.className = 'blow-btn';
      btn.textContent = '💨 Thổi nến 💨';
      btn.addEventListener('click', (e) => { e.stopPropagation(); blowCandles(); });
      hint.replaceWith(btn);
    }
    setTimeout(addBlowButton, 4000);
  </script>
</body>

</html>
