<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Gift For You ♥</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 20%, #dbbdcc 0%, #d7b1c4 30%, #ce8db5 60%, #c545ac 100%);
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Background Layer ── */
    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Bokeh blobs */
    .bokeh {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: floatBokeh linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes floatBokeh {
      0% {
        transform: translateY(110vh) scale(0.8);
        opacity: 0;
      }

      10% {
        opacity: 0.2;
      }

      90% {
        opacity: 0.18;
      }

      100% {
        transform: translateY(-15vh) scale(1.3);
        opacity: 0;
      }
    }

    /* Floating petals */
    .petal {
      position: fixed;
      border-radius: 50% 0 50% 50%;
      pointer-events: none;
      z-index: 1;
      animation: floatPetal linear infinite;
    }

    @keyframes floatPetal {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 0.35;
      }

      90% {
        opacity: 0.25;
      }

      100% {
        transform: translateY(-100px) rotate(360deg);
        opacity: 0;
      }
    }

    /* ── Hint text ── */
    #hintText {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(140, 45, 85, 0.7);
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      z-index: 20;
      text-align: center;
      pointer-events: none;
      animation: hintPulse 3s ease-in-out infinite;
    }

    @keyframes hintPulse {

      0%,
      100% {
        opacity: 0.55;
      }

      50% {
        opacity: 1;
      }
    }

    /* ── Scene ── */
    #scene {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── Crystal Orb ── */
    #orb {
      position: relative;
      width: 240px;
      height: 240px;
      cursor: pointer;
      filter: drop-shadow(0 0 50px rgba(255, 80, 160, 0.75)) drop-shadow(0 0 100px rgba(200, 60, 140, 0.4));
      animation: orbFloat 5s ease-in-out infinite;
      transition: filter 0.4s ease;
    }

    #orb:hover {
      filter: drop-shadow(0 0 70px rgba(255, 80, 160, 0.95)) drop-shadow(0 0 140px rgba(200, 60, 140, 0.6));
    }

    @keyframes orbFloat {

      0%,
      100% {
        transform: translateY(0) rotate(-2deg);
      }

      50% {
        transform: translateY(-14px) rotate(2deg);
      }
    }

    /* Outer aura rings */
    .aura-ring {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 120, 180, 0.35);
      animation: auraPulse 3s ease-in-out infinite;
    }

    .aura-ring:nth-child(2) {
      inset: -38px;
      border-color: rgba(255, 120, 180, 0.2);
      animation-delay: 1s;
    }

    .aura-ring:nth-child(3) {
      inset: -56px;
      border-color: rgba(255, 120, 180, 0.1);
      animation-delay: 2s;
    }

    @keyframes auraPulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.7;
      }

      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }

    /* Orb glass sphere */
    .orb-glass {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(ellipse at 35% 25%,
          rgba(255, 255, 255, 0.92) 0%,
          rgba(230, 100, 200, 0.35) 30%,
          rgba(170, 50, 160, 0.55) 60%,
          rgba(110, 20, 130, 0.75) 100%);
      box-shadow:
        inset 0 0 60px rgba(255, 150, 200, 0.5),
        inset -15px -15px 50px rgba(80, 0, 80, 0.2),
        0 8px 60px rgba(200, 80, 160, 0.5),
        0 0 100px rgba(200, 80, 160, 0.25);
      overflow: hidden;
    }

    /* Glass reflection highlight */
    .orb-highlight {
      position: absolute;
      top: 12%;
      left: 18%;
      width: 35%;
      height: 22%;
      background: radial-gradient(ellipse, rgba(255, 255, 255, 0.7), transparent);
      border-radius: 50%;
      transform: rotate(-30deg);
      filter: blur(4px);
    }

    .orb-highlight2 {
      position: absolute;
      top: 18%;
      left: 22%;
      width: 15%;
      height: 10%;
      background: radial-gradient(ellipse, rgba(255, 255, 255, 0.5), transparent);
      border-radius: 50%;
      filter: blur(3px);
    }

    /* Inner nebula swirl */
    #nebula {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
    }

    .nebula-cloud {
      position: absolute;
      border-radius: 50%;
      filter: blur(20px);
      animation: nebulaDrift ease-in-out infinite alternate;
    }

    @keyframes nebulaDrift {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(15px, -10px) scale(1.1);
      }
    }

    /* Crystal heart inside */
    .crystal-heart {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 64px;
      filter: drop-shadow(0 0 20px rgba(255, 80, 160, 0.9)) drop-shadow(0 0 40px rgba(255, 80, 160, 0.5));
      animation: crystalPulse 2.5s ease-in-out infinite;
      z-index: 5;
    }

    @keyframes crystalPulse {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        filter: drop-shadow(0 0 20px rgba(255, 80, 160, 0.9)) drop-shadow(0 0 40px rgba(255, 80, 160, 0.5));
      }

      50% {
        transform: translate(-50%, -50%) scale(1.12);
        filter: drop-shadow(0 0 35px rgba(255, 80, 160, 1)) drop-shadow(0 0 70px rgba(255, 80, 160, 0.7));
      }
    }

    /* Orb pedestal/base */
    .orb-base {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 18px;
      background: linear-gradient(180deg, #e8a0d0, #c060a0);
      border-radius: 0 0 50% 50%;
      box-shadow: 0 4px 20px rgba(200, 80, 160, 0.4);
    }

    .orb-base::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 10px;
      background: linear-gradient(180deg, #f0b8e0, #d080b8);
      border-radius: 0 0 50% 50%;
    }

    /* Magic sparkles around orb */
    .sparkle-dot {
      position: absolute;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 10px 4px rgba(255, 180, 230, 1);
      animation: sparkleOrbit linear infinite;
      pointer-events: none;
    }

    @keyframes sparkleOrbit {
      0% {
        transform: rotate(0deg) translateX(135px) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: rotate(360deg) translateX(135px) rotate(-360deg);
        opacity: 0;
      }
    }

    /* ── Opened state ── */
    #orb.opened .crystal-heart {
      animation: heartFlyAway 1.2s ease forwards;
    }

    @keyframes heartFlyAway {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }

      50% {
        transform: translate(-50%, -80%) scale(1.5);
        opacity: 1;
      }

      100% {
        transform: translate(-50%, -120%) scale(0);
        opacity: 0;
      }
    }

    #orb.opened {
      animation: orbShatter 0.8s ease forwards;
      cursor: default;
    }

    @keyframes orbShatter {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      30% {
        transform: scale(1.2);
        opacity: 1;
        filter: drop-shadow(0 0 80px rgba(255, 80, 160, 1));
      }

      100% {
        transform: scale(0);
        opacity: 0;
      }
    }

    /* ── Floating debris when orb breaks ── */
    .debris {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 15;
      animation: debrisFly ease-out forwards;
    }

    @keyframes debrisFly {
      0% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(0);
      }
    }

    /* ── Calendar ── */
    #calendarWrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #calendarWrap.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .cal-header {
      color: #a02868;
      font-size: 18px;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(255, 100, 160, 0.4);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      padding: 20px 24px;
      background: rgba(255, 255, 255, 0.8);
      border: 1.5px solid rgba(180, 80, 130, 0.35);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 40px rgba(160, 50, 110, 0.2), 0 0 0 6px rgba(255, 255, 255, 0.15);
    }

    .cal-day-label {
      color: rgba(150, 50, 90, 0.55);
      font-size: 12px;
      text-align: center;
      letter-spacing: 1px;
    }

    .cal-cell {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: rgba(130, 35, 80, 0.75);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .cal-cell:hover {
      background: rgba(220, 80, 140, 0.25);
      color: #a02868;
      transform: scale(1.1);
    }

    .cal-cell.empty {
      cursor: default;
    }

    .cal-cell.empty:hover {
      background: none;
      transform: none;
    }

    .cal-cell.wrong {
      animation: wrongShake 0.4s ease;
      color: #cc3366 !important;
    }

    @keyframes wrongShake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-5px);
      }

      75% {
        transform: translateX(5px);
      }
    }

    .cal-cell.correct {
      background: linear-gradient(135deg, #e04080, #c01060);
      color: white !important;
      box-shadow: 0 0 20px rgba(200, 30, 110, 0.9);
      animation: correctPop 0.5s ease forwards;
    }

    @keyframes correctPop {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.4);
      }

      100% {
        transform: scale(1.15);
      }
    }

    /* ── Wrong answer overlay ── */
    #wrongOverlay {
      position: fixed;
      inset: 0;
      z-index: 45;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      background: rgba(0, 0, 0, 0.15);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #wrongOverlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    #wrongMsg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #c83060;
      font-size: 26px;
      letter-spacing: 3px;
      text-shadow: 0 0 30px rgba(255, 100, 160, 0.8), 0 0 60px rgba(255, 100, 160, 0.4);
      opacity: 0;
      pointer-events: none;
      z-index: 55;
      transition: opacity 0.3s ease, transform 0.3s ease;
      font-style: italic;
      font-family: 'Dancing Script', 'Georgia', serif;
      text-align: center;
      white-space: nowrap;
    }

    #wrongMsg.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.05);
    }

    /* ── Success overlay ── */
    #successOverlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: radial-gradient(ellipse at 50% 30%, #f0ced7f4, #ff6bb5 50%, #ec72bb 100%);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    #successOverlay.show {
      display: flex;
    }

    .successHearts {
      font-size: 60px;
      animation: heartBurst 1s ease forwards;
    }

    @keyframes heartBurst {
      0% {
        transform: scale(0) rotate(-20deg);
        opacity: 0;
      }

      60% {
        transform: scale(1.3) rotate(5deg);
        opacity: 1;
      }

      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .successText {
      color: #a02868;
      font-size: 20px;
      letter-spacing: 5px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(255, 100, 160, 0.4);
      animation: fadeInUp 0.8s 0.3s ease both;
    }

    .successSubtext {
      color: rgba(130, 40, 80, 0.8);
      font-size: 13px;
      letter-spacing: 3px;
      animation: fadeInUp 0.8s 0.6s ease both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .enterBtn {
      margin-top: 20px;
      padding: 14px 40px;
      background: linear-gradient(135deg, #ff69b4, #ff1493);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(255, 20, 147, 0.5);
      animation: fadeInUp 0.8s 0.9s ease both, bounce 2s 1.7s ease infinite;
      transition: transform 0.2s;
    }

    .enterBtn:hover {
      transform: scale(1.05);
    }

    .tapHint {
      color: rgba(140, 45, 85, 0.65);
      font-size: 13px;
      letter-spacing: 3px;
      text-align: center;
      animation: hintPulse 2s ease-in-out infinite;
    }
  </style>
</head>

<body>

  <canvas id="bgCanvas"></canvas>
  <div id="hintText">The Begin day of love ♥</div>
  <div id="wrongOverlay"></div>
  <div id="wrongMsg">😤 Bé có nhớ đâu :(</div>

  <div id="scene">
    <!-- Crystal Orb -->
    <div id="orb" onclick="handleOrbClick()">
      <div class="aura-ring"></div>
      <div class="aura-ring"></div>
      <div class="aura-ring"></div>
      <div class="orb-glass">
        <div class="orb-highlight"></div>
        <div class="orb-highlight2"></div>
        <div id="nebula">
          <div class="nebula-cloud"
            style="width:130px;height:130px;top:8%;left:5%;background:radial-gradient(circle,rgba(220,60,170,0.7),transparent);animation-duration:4s;">
          </div>
          <div class="nebula-cloud"
            style="width:110px;height:110px;top:38%;left:48%;background:radial-gradient(circle,rgba(255,80,150,0.65),transparent);animation-duration:6s;animation-delay:1s;">
          </div>
          <div class="nebula-cloud"
            style="width:90px;height:90px;bottom:8%;left:18%;background:radial-gradient(circle,rgba(180,60,200,0.6),transparent);animation-duration:5s;animation-delay:2s;">
          </div>
          <div class="nebula-cloud"
            style="width:65px;height:65px;top:18%;right:8%;background:radial-gradient(circle,rgba(255,120,170,0.55),transparent);animation-duration:7s;animation-delay:0.5s;">
          </div>
        </div>
        <div class="crystal-heart">❤️</div>
      </div>
      <div class="orb-base"></div>
      <!-- Orbiting sparkles -->
      <div class="sparkle-dot" style="width:5px;height:5px;animation-duration:4s;"></div>
      <div class="sparkle-dot" style="width:3px;height:3px;animation-duration:6s;animation-delay:-2s;"></div>
      <div class="sparkle-dot" style="width:4px;height:4px;animation-duration:5s;animation-delay:-3.5s;"></div>
    </div>

    <!-- Calendar -->
    <div id="calendarWrap">
      <div class="tapHint">Nhớ chọn ngày kỷ niệm nha bé ♥</div>
      <div class="cal-header">Tháng 8 · 2025</div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <!-- Success overlay -->
  <div id="successOverlay">
    <div class="successHearts">♥♥♥</div>
    <div class="successText">Ngày tuyệt vời nhất</div>
    <div class="successSubtext">30 / 08 / 2025 — Ngày chúng ta bắt đầu</div>
    <button class="enterBtn" onclick="goToMain()">Enter ♥</button>
  </div>

  <script>
    /* ── Background canvas ── */
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas(); window.addEventListener('resize', resizeCanvas);

    function spawnParticle() {
      const isHeart = Math.random() < 0.3;
      const colors = isHeart
        ? ['#ff69b4', '#ff1493', '#ffb6c1', '#ff85a2', '#ffc0cb', '#e84393']
        : ['#ddc8d6', '#d4bdd0', '#e0b8c8', '#d8a8c0', '#ecc8d8'];
      particles.push({
        x: Math.random() * canvas.width, y: canvas.height + 20,
        size: isHeart ? 14 + Math.random() * 20 : 4 + Math.random() * 8,
        speed: 0.4 + Math.random() * 1.2,
        opacity: 0.3 + Math.random() * 0.3,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.02 + Math.random() * 0.03,
        color: colors[Math.floor(Math.random() * colors.length)],
        isHeart,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.04,
      });
    }

    function drawHeart(x, y, size, color, opacity) {
      ctx.save(); ctx.globalAlpha = opacity; ctx.fillStyle = color;
      ctx.translate(x, y);
      ctx.beginPath();
      ctx.moveTo(0, size * 0.3);
      ctx.bezierCurveTo(-size / 2, -size * 0.3, -size, size * 0.1, 0, size);
      ctx.bezierCurveTo(size, size * 0.1, size / 2, -size * 0.3, 0, size * 0.3);
      ctx.fill(); ctx.restore();
    }

    function animateCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (Math.random() < 0.025) spawnParticle();
      particles = particles.filter(p => p.y > -80);
      particles.forEach(p => {
        p.y -= p.speed; p.x += Math.sin(p.wobble) * 0.5;
        p.wobble += p.wobbleSpeed; p.rotation += p.rotSpeed;
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
        ctx.globalAlpha = p.opacity;
        if (p.isHeart) { drawHeart(0, 0, p.size, p.color, p.opacity); }
        else { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(0, 0, p.size, 0, Math.PI * 2); ctx.fill(); }
        ctx.restore();
      });
      requestAnimationFrame(animateCanvas);
    }
    animateCanvas();

    /* ── Bokeh blobs ── */
    const bokehColors = ['#c8a0b8', '#b888a0', '#a07090', '#d0a8c0', '#c098b0', '#c8a8bc'];
    for (let i = 0; i < 8; i++) {
      const b = document.createElement('div'); b.className = 'bokeh';
      const size = 200 + Math.random() * 280;
      b.style.cssText = `width:${size}px;height:${size}px;left:${Math.random() * 100}%;background:${bokehColors[i % bokehColors.length]};animation-duration:${18 + Math.random() * 25}s;animation-delay:${-Math.random() * 25}s;`;
      document.body.appendChild(b);
    }

    /* ── Floating petals ── */
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div'); p.className = 'petal';
      const size = 8 + Math.random() * 14;
      p.style.cssText = `
        left:${Math.random() * 100}%;
        width:${size}px; height:${size}px;
        background:rgba(200,${80 + Math.floor(Math.random() * 60)},${120 + Math.floor(Math.random() * 40)},0.3);
        animation-duration:${10 + Math.random() * 14}s;
        animation-delay:${-Math.random() * 14}s;
      `;
      document.body.appendChild(p);
    }

    /* ── Orb click → shatter + calendar ── */
    let opened = false;
    function handleOrbClick() {
      if (opened) return;
      opened = true;

      const orb = document.getElementById('orb');
      orb.classList.add('opened');
      orb.onclick = null;

      // Spawn debris shards
      spawnDebris();

      // Show calendar after orb disappears
      setTimeout(() => {
        orb.style.display = 'none';
        buildCalendar();
        const calWrap = document.getElementById('calendarWrap');
        calWrap.style.display = 'flex';
        requestAnimationFrame(() => calWrap.classList.add('visible'));
      }, 900);
    }

    function spawnDebris() {
      const orb = document.getElementById('orb');
      const rect = orb.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const colors = ['#ff69b4', '#ff1493', '#ff85a2', '#ffaac8', '#dda0dd', '#ffb6c1', '#e8a0c8'];
      for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'debris';
        const angle = (i / 30) * Math.PI * 2;
        const dist = 120 + Math.random() * 200;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist - 60;
        const size = 6 + Math.random() * 14;
        el.style.cssText = `
          left:${cx - size / 2}px; top:${cy - size / 2}px;
          width:${size}px; height:${size}px;
          background:${colors[i % colors.length]};
          --tx:${tx}px; --ty:${ty}px;
          animation-duration:${0.8 + Math.random() * 0.8}s;
          box-shadow: 0 0 ${size}px ${colors[i % colors.length]};
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1600);
      }
    }

    /* ── Calendar ── */
    const CORRECT_DAY = 30;
    function buildCalendar() {
      const grid = document.getElementById('calGrid');
      grid.innerHTML = '';
      const labels = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];
      // Adjust: Vietnamese week starts Monday (CN=0), Aug 2026 starts Saturday
      // Aug 1 2026 = Saturday, so weekday index: CN=0, T2=1...T6=5, T7=6
      const firstDay = 6; // Saturday = index 6 (T7)
      labels.forEach(l => {
        const d = document.createElement('div'); d.className = 'cal-day-label'; d.textContent = l; grid.appendChild(d);
      });
      for (let i = 0; i < firstDay; i++) {
        const e = document.createElement('div'); e.className = 'cal-cell empty'; grid.appendChild(e);
      }
      for (let d = 1; d <= 31; d++) {
        const cell = document.createElement('div'); cell.className = 'cal-cell';
        cell.textContent = d; cell.dataset.day = d;
        cell.addEventListener('click', () => handleDayClick(d, cell));
        grid.appendChild(cell);
      }
    }

    function handleDayClick(day, cell) {
      if (cell.classList.contains('correct') || cell.classList.contains('wrong')) return;
      if (day === CORRECT_DAY) {
        document.querySelectorAll('.cal-cell:not(.empty)').forEach(c => {
          if (parseInt(c.dataset.day) === CORRECT_DAY) c.classList.add('correct');
        });
        burstHearts();
        setTimeout(() => { document.getElementById('successOverlay').classList.add('show'); }, 600);
      } else {
        cell.classList.add('wrong');
        setTimeout(() => cell.classList.remove('wrong'), 500);

        const overlay = document.getElementById('wrongOverlay');
        const msg = document.getElementById('wrongMsg');

        overlay.classList.add('show');
        msg.classList.add('show');

        setTimeout(() => {
          overlay.classList.remove('show');
          msg.classList.remove('show');
        }, 1200);
      }
    }

    function burstHearts() {
      for (let i = 0; i < 45; i++) setTimeout(() => spawnParticle(), i * 25);
    }

    function goToMain() { window.location.href = 'index.html'; }
  </script>
</body>
