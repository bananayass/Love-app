<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hello Kitty Couples Quiz!">
    <meta name="theme-color" content="#FFFAF0">
    <title>💕 Hello Kitty Quiz 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Quicksand:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/quiz.css">
</head>

<body>
    <!-- Fixed background decorations -->
    <div class="bg-deco" id="bgDeco"></div>

    <!-- Main page content -->
    <div class="page-wrapper">

        <!-- Hero / Header -->
        <section class="hero">
            <img src="../images/hello kitty.png" alt="Hello Kitty" class="hero-kitty" />
            <h1 class="hero-title">💕 Hello Kitty Quiz 💕</h1>
            <p class="hero-subtitle">Đố vui cho bé</p>

        </section>

        <!-- Quiz section -->
        <section class="quiz-section">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="score-display">
                <span class="heart-icon">❤️</span>
                Điểm: <span id="scoreNum">0</span> / <span id="totalNum">10</span>
            </div>

            <div class="question-card" id="questionCard">
                <svg class="card-bow" viewBox="0 0 80 45" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="18" cy="22" rx="17" ry="12" fill="#FF4F5B" transform="rotate(-12 18 22)" />
                    <ellipse cx="62" cy="22" rx="17" ry="12" fill="#FF4F5B" transform="rotate(12 62 22)" />
                    <circle cx="40" cy="26" r="10" fill="#FF4F5B" />
                    <circle cx="40" cy="26" r="5.5" fill="#FFB6C1" />
                    <ellipse cx="15" cy="20" rx="7" ry="5" fill="#FF6B75" transform="rotate(-12 15 20)" opacity="0.5" />
                    <ellipse cx="65" cy="20" rx="7" ry="5" fill="#FF6B75" transform="rotate(12 65 20)" opacity="0.5" />
                </svg>

                <div class="question-number" id="questionNumber">Câu 1 / 10</div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
            </div>

            <div class="result-container hidden" id="resultContainer">
                <span class="result-bow">🎀</span>
                <div class="result-score" id="resultScore"></div>
                <div class="result-label">Điểm của bé nè</div>
                <div class="result-message" id="resultMessage"></div>
                <div class="result-actions">
                    <button class="btn-retry" id="retryBtn">Chơi lại 💖</button>
                    <a href="profile.html" class="btn-back">Qua bên đó nào →</a>
                </div>
            </div>
        </section>

    </div>

    <script src="../js/quiz.js"></script>
</body>

</html>
